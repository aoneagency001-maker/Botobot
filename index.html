<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión profesional de activos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    a.btn {
      display: inline-block;
      background: #229ED9;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 16px 36px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    a.btn:hover {
      background: #1a8bbf;
      transform: translateY(-1px);
    }

    a.btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gestión profesional de activos con +20 años de éxito.</h1>
    <p>Equipo global. Estrategias diversas. Control de riesgos estricto y soporte técnico exclusivo.<br><br>Descubre todos los detalles en nuestro canal de soporte.</p>
    <a class="btn" href="https://t.me/твоя_группа" target="_blank">
      Unirse al canal
    </a>
  </div>
</body>
</html>
