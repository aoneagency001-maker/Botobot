<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión profesional de activos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 800;
      color: #111;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    p {
      font-size: clamp(1rem, 4vw, 1.15rem);
      color: #555;
      margin-bottom: 16px;
      line-height: 1.7;
    }

    .cta-text {
      font-size: clamp(1rem, 4vw, 1.1rem);
      color: #111;
      font-weight: 600;
      margin-bottom: 32px;
    }

    a.btn {
      display: block;
      width: 100%;
      background: #1a56db;
      color: #fff;
      font-size: clamp(1.1rem, 4.5vw, 1.25rem);
      font-weight: 700;
      padding: 20px 24px;
      border-radius: 14px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    a.btn:hover {
      background: #1447c0;
      transform: translateY(-2px);
    }

    a.btn:active {
      transform: translateY(0);
    }

    @media (min-width: 480px) {
      a.btn {
        display: inline-block;
        width: auto;
        padding: 20px 48px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gestión profesional de activos con +20 años de éxito.</h1>
    <p>Equipo global. Estrategias diversas. Control de riesgos estricto y soporte técnico exclusivo.</p>
    <p class="cta-text">Visita nuestro sitio web para obtener información detallada.</p>
    <a class="btn" href="https://albitcapital.com/es" target="_blank">
      Ir al sitio web →
    </a>
  </div>
</body>
</html>
